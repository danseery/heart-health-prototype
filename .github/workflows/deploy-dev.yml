name: Deploy dev

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - "infra/terraform/**"
      - ".github/workflows/deploy-dev.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Provision and deploy dev
    runs-on: ubuntu-latest
    environment: dev

    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      TF_IN_AUTOMATION: true
      TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_tenant_id: ${{ vars.AZURE_TENANT_ID }}
      TF_VAR_azure_openai_deployment: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        env:
          PYTHONPATH: backend
        run: pytest backend/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Discover Big Brain configuration
        shell: bash
        run: |
          set -euo pipefail

          endpoint="$(awk -F '"' '/azure_openai_endpoint/ { print $2; exit }' infra/terraform/environments/dev.tfvars)"
          if [ -z "${endpoint}" ]; then
            echo "::error::Set azure_openai_endpoint in infra/terraform/environments/dev.tfvars."
            exit 1
          fi

          host="${endpoint#https://}"
          host="${host#http://}"
          host="${host%%/*}"

          case "${host}" in
            *.services.ai.azure.com)
              account_name="${host%.services.ai.azure.com}"
              ;;
            *.openai.azure.com)
              account_name="${host%.openai.azure.com}"
              ;;
            *)
              echo "::error::Unsupported Azure AI endpoint host '${host}'."
              exit 1
              ;;
          esac

          resource_group="$(az resource list \
            --name "${account_name}" \
            --resource-type "Microsoft.CognitiveServices/accounts" \
            --query "[0].resourceGroup" \
            --output tsv)"

          if [ -z "${resource_group}" ]; then
            echo "::error::Could not find Azure AI account '${account_name}' in the active subscription."
            exit 1
          fi

          api_key="$(az cognitiveservices account keys list \
            --name "${account_name}" \
            --resource-group "${resource_group}" \
            --query "key1" \
            --output tsv)"

          if [ -z "${api_key}" ]; then
            echo "::error::Could not read an API key for Azure AI account '${account_name}'."
            exit 1
          fi

          deployment="${TF_VAR_azure_openai_deployment:-}"
          if [ -z "${deployment}" ]; then
            echo "::error::Set AZURE_OPENAI_DEPLOYMENT in the GitHub dev environment."
            exit 1
          fi

          echo "::add-mask::${api_key}"
          echo "TF_VAR_azure_openai_api_key=${api_key}" >> "${GITHUB_ENV}"
          echo "TF_VAR_azure_openai_deployment=${deployment}" >> "${GITHUB_ENV}"
          echo "Discovered Big Brain account '${account_name}' in resource group '${resource_group}' using deployment '${deployment}'."

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RESOURCE_GROUP_NAME }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_STORAGE_ACCOUNT_NAME }}" \
            -backend-config="container_name=${{ vars.TF_STATE_CONTAINER_NAME }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="use_oidc=true" \
            -backend-config="use_azuread_auth=true" \
            -backend-config="client_id=${{ vars.AZURE_CLIENT_ID }}" \
            -backend-config="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -backend-config="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}"

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Provision shared dev infrastructure
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var-file="environments/dev.tfvars" \
            -var="create_container_apps=false"

      - name: Read Terraform outputs
        id: tf
        working-directory: infra/terraform
        run: |
          echo "acr_name=$(terraform output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "backend_api_base_url=$(terraform output -raw backend_api_base_url)" >> "$GITHUB_OUTPUT"
          echo "frontend_url=$(terraform output -raw frontend_url)" >> "$GITHUB_OUTPUT"

      - name: Refresh Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name "${{ steps.tf.outputs.acr_name }}"

      - name: Build backend image
        run: |
          docker build \
            --file backend/Dockerfile \
            --tag "${{ steps.tf.outputs.acr_login_server }}/hearthealth-api:${{ github.sha }}" \
            backend

      - name: Build frontend image
        run: |
          docker build \
            --file frontend/Dockerfile \
            --build-arg "VITE_API_BASE_URL=${{ steps.tf.outputs.backend_api_base_url }}" \
            --tag "${{ steps.tf.outputs.acr_login_server }}/hearthealth-web:${{ github.sha }}" \
            frontend

      - name: Push images
        run: |
          docker push "${{ steps.tf.outputs.acr_login_server }}/hearthealth-api:${{ github.sha }}"
          docker push "${{ steps.tf.outputs.acr_login_server }}/hearthealth-web:${{ github.sha }}"

      - name: Deploy container apps
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var-file="environments/dev.tfvars" \
            -var="create_container_apps=true" \
            -var="container_image_tag=${{ github.sha }}"

      - name: Show dev URLs
        working-directory: infra/terraform
        run: |
          echo "Frontend: $(terraform output -raw frontend_url)"
          echo "Backend: $(terraform output -raw backend_url)"
          echo "Health: $(terraform output -raw backend_url)/api/health"
